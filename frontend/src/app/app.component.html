<div class="app-container">
      <div class="router-wrap">
        <router-outlet />
      </div>
      @if (showNav) {
        <nav class="bottom-nav">
          <button class="nav-item" [class.active]="activeRoute === 'discover'" (click)="navigate('discover')">
            <i class="ti ti-dice"></i>
            <span>Discover</span>
          </button>
          <button class="nav-item" [class.active]="activeRoute === 'library'" (click)="navigate('library')">
            <i class="ti ti-books"></i>
            <span>Bibliothèque</span>
          </button>
          <button class="nav-item" [class.active]="activeRoute === 'search'" (click)="navigate('search')">
            <i class="ti ti-search"></i>
            <span>Chercher</span>
          </button>
          <button class="nav-item" [class.active]="activeRoute === 'profile'" (click)="navigate('profile')">
            <i class="ti ti-user"></i>
            <span>Profil</span>
          </button>
        </nav>
      }
    </div>
